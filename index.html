<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IdeaVault — Private Innovation Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & ROOT ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;
  --bg2:#0d0d1f;
  --bg3:#12122a;
  --surface:rgba(255,255,255,0.03);
  --surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --accent:#7c5cfc;
  --accent2:#a78bfa;
  --accent3:#c084fc;
  --emerald:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --text:#e8e8f0;
  --text2:#9898b0;
  --text3:#5a5a78;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --radius:16px;
  --radius-sm:10px;
  --radius-xs:6px;
  --sidebar:260px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}

html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,92,252,0.4);border-radius:99px}

/* ─── NOISE OVERLAY ───────────────────────────────────────────── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:0.025;pointer-events:none;z-index:9999}

/* ─── GLOW BLOBS ──────────────────────────────────────────────── */
.bg-blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(120px);animation:float 20s ease-in-out infinite}
.blob1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,92,252,0.12),transparent 70%);top:-200px;left:-200px;animation-delay:0s}
.blob2{width:500px;height:500px;background:radial-gradient(circle,rgba(192,132,252,0.08),transparent 70%);bottom:-150px;right:-100px;animation-delay:-7s}
.blob3{width:400px;height:400px;background:radial-gradient(circle,rgba(16,185,129,0.06),transparent 70%);top:40%;left:40%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}

/* ─── LAYOUT ──────────────────────────────────────────────────── */
#app{position:relative;z-index:1;min-height:100vh}

/* ─── GLASS SURFACES ──────────────────────────────────────────── */
.glass{background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border)}
.glass-dark{background:rgba(6,6,15,0.75);backdrop-filter:blur(24px);border:1px solid var(--border)}
.glass-strong{background:rgba(12,12,28,0.85);backdrop-filter:blur(24px);border:1px solid var(--border2)}

/* ─── TYPOGRAPHY ──────────────────────────────────────────────── */
.font-display{font-family:var(--font-display)}
.gradient-text{background:linear-gradient(135deg,#a78bfa,#c084fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-text-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ─── BUTTONS ─────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-body);font-weight:500;cursor:pointer;transition:all 0.2s;border:none;outline:none;white-space:nowrap;font-size:13px}
.btn-primary{background:linear-gradient(135deg,#6d4fea,#8b5cf6,#a855f7);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);box-shadow:0 4px 20px rgba(124,92,252,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,92,252,0.5)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--surface2);color:var(--text2);padding:9px 18px;border-radius:var(--radius-sm);border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--text);border-color:rgba(255,255,255,0.2)}
.btn-danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);padding:6px 12px;border-radius:var(--radius-xs)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--radius-xs)}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:5px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px}

/* ─── INPUTS ──────────────────────────────────────────────────── */
.input{width:100%;background:rgba(6,6,15,0.6);border:1px solid var(--border2);color:var(--text);padding:12px 16px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;outline:none;transition:all 0.2s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.15)}
.input::placeholder{color:var(--text3)}
textarea.input{resize:none}
.label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px}

/* ─── TAGS / BADGES ───────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap}
.tag-novel{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25)}
.tag-exists{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.25)}
.tag-pending{background:rgba(124,92,252,0.12);color:var(--accent2);border:1px solid rgba(124,92,252,0.25)}
.tag-admin{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.05em}
.tag-guest{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);font-size:10px;padding:2px 7px;border-radius:4px}
.tag-default{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* ─── ANIMATIONS ──────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}
@keyframes progress{from{width:0}to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.fade-up{animation:fadeUp 0.4s ease forwards}
.fade-in{animation:fadeIn 0.3s ease forwards}
.scale-in{animation:scaleIn 0.25s ease forwards}

/* ─── PULSE DOT ───────────────────────────────────────────────── */
.pulse-dot{width:7px;height:7px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite;display:inline-block;flex-shrink:0}

/* ─── LOGIN PAGE ──────────────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);border-radius:22px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(124,92,252,0.4)}
.login-logo h1{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-0.5px}
.login-logo p{color:var(--text2);font-size:13px;margin-top:4px}
.login-status{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;font-size:11px;font-weight:500;padding:4px 12px;border-radius:99px;margin-top:10px}

.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.2s;text-align:center;border:none;background:transparent;font-family:var(--font-body)}
.tab.active{background:linear-gradient(135deg,#6d4fea,#8b5cf6);color:#fff;box-shadow:0 3px 12px rgba(124,92,252,0.35)}
.tab:not(.active):hover{color:var(--text);background:rgba(255,255,255,0.05)}

.login-panel{animation:fadeUp 0.35s ease}
.form-group{margin-bottom:16px}
.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:16px;display:none}
.error-box.show{display:block}

.option-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.option-card{background:rgba(6,6,15,0.6);border:1px solid var(--border2);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all 0.22s;text-align:center}
.option-card:hover{border-color:rgba(124,92,252,0.4);background:rgba(124,92,252,0.06);transform:translateY(-2px)}
.option-card.selected{border-color:var(--accent);background:rgba(124,92,252,0.12);box-shadow:0 0 0 1px rgba(124,92,252,0.3)}
.option-card .oc-icon{font-size:28px;margin-bottom:8px}
.option-card .oc-title{font-size:13px;font-weight:600;color:var(--text)}
.option-card .oc-desc{font-size:11px;color:var(--text3);margin-top:3px}

/* ─── SIDEBAR ─────────────────────────────────────────────────── */
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:rgba(6,6,15,0.8);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo-text{font-family:var(--font-display);font-weight:700;font-size:15px}
.sidebar-logo-sub{font-size:10px;color:var(--text3);margin-top:1px}

.sidebar-user{margin:12px;padding:12px;background:rgba(124,92,252,0.08);border:1px solid rgba(124,92,252,0.18);border-radius:12px}
.sidebar-user-avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.sidebar-user-info{flex:1;min-width:0}
.sidebar-user-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-email{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.sidebar-nav{padding:8px 10px;flex:1}
.nav-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:13px;font-weight:500;border:1px solid transparent;margin-bottom:2px;text-decoration:none}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:rgba(124,92,252,0.14);border-color:rgba(124,92,252,0.25);color:#c4b5fd}
.nav-item svg{opacity:0.65;flex-shrink:0;width:15px;height:15px}
.nav-item.active svg{opacity:1}
.nav-item.admin-nav{color:#fbbf24}
.nav-item.admin-nav:hover{background:rgba(245,158,11,0.08)}
.nav-item.admin-nav.active{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25)}

.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border-radius:10px;background:none;border:none;color:var(--text3);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all 0.15s}
.logout-btn:hover{background:rgba(239,68,68,0.08);color:#f87171}

/* ─── MAIN CONTENT ────────────────────────────────────────────── */
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;background:rgba(6,6,15,0.82);backdrop-filter:blur(20px)}
.topbar-title{font-family:var(--font-display);font-size:16px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.content{padding:28px;flex:1}

/* ─── STATS ───────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:border-color 0.2s}
.stat-card:hover{border-color:rgba(124,92,252,0.3)}
.stat-icon{font-size:22px;margin-bottom:10px}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--text);line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}

/* ─── SECTION HEADER ──────────────────────────────────────────── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-display);font-size:15px;font-weight:700}
.tab-pills{display:flex;gap:6px}
.pill{padding:5px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;font-family:var(--font-body)}
.pill.active{background:linear-gradient(135deg,#6d4fea,#8b5cf6);color:#fff}
.pill:not(.active){background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.pill:not(.active):hover{color:var(--text)}

/* ─── IDEA CARD ───────────────────────────────────────────────── */
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.idea-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s}
.idea-card:hover{border-color:rgba(124,92,252,0.4);background:rgba(124,92,252,0.04);transform:translateY(-2px);box-shadow:var(--shadow)}
.idea-card-title{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.idea-card-meta{font-size:11px;color:var(--text3);margin-bottom:10px}
.idea-card-desc{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.add-idea-card{border:1px dashed rgba(124,92,252,0.25);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;color:var(--text3)}
.add-idea-card:hover{border-color:rgba(124,92,252,0.5);background:rgba(124,92,252,0.04);color:var(--text2)}
.add-idea-icon{width:36px;height:36px;border-radius:10px;background:rgba(124,92,252,0.12);display:flex;align-items:center;justify-content:center}

/* ─── GROUP CARD ──────────────────────────────────────────────── */
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s}
.group-card:hover{border-color:rgba(124,92,252,0.4);background:rgba(124,92,252,0.04);transform:translateY(-2px)}
.group-card-name{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.group-card-desc{font-size:12px;color:var(--text2);margin-bottom:12px}
.group-card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.join-code-badge{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;font-family:monospace;letter-spacing:0.05em}

/* ─── IDEA DETAIL ─────────────────────────────────────────────── */
.idea-detail-wrap{max-width:800px}
.idea-desc-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px}
.analysis-box{background:var(--surface);border:1px solid rgba(124,92,252,0.2);border-radius:var(--radius);padding:22px;margin-bottom:18px}
.analysis-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.analysis-icon{width:36px;height:36px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.verdict-box{padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:16px}
.verdict-novel{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2)}
.verdict-exists{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2)}

.step-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.step-num{width:24px;height:24px;border-radius:99px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.5}

.paper-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:rgba(6,6,15,0.5);border:1px solid var(--border);transition:all 0.2s;text-decoration:none;margin-bottom:8px;cursor:pointer}
.paper-card:hover{border-color:rgba(124,92,252,0.35);background:rgba(124,92,252,0.05)}
.paper-icon{width:36px;height:36px;border-radius:9px;background:rgba(168,85,247,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.paper-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px;transition:color 0.15s}
.paper-card:hover .paper-title{color:var(--accent2)}
.paper-meta{font-size:11px;color:var(--text3)}

.link-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:rgba(6,6,15,0.5);border:1px solid var(--border);transition:all 0.2s;text-decoration:none;margin-bottom:8px;cursor:pointer}
.link-card:hover{border-color:rgba(124,92,252,0.35);background:rgba(124,92,252,0.05)}
.link-icon{width:36px;height:36px;border-radius:9px;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ─── GROUP CHAT ──────────────────────────────────────────────── */
.chat-layout{display:flex;flex-direction:column;height:100vh;max-height:100vh}
.chat-topbar{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(6,6,15,0.82);backdrop-filter:blur(20px);flex-shrink:0}
.chat-title{font-family:var(--font-display);font-size:15px;font-weight:700}
.member-avatars{display:flex;margin-left:auto}
.member-avatar{width:28px;height:28px;border-radius:99px;border:2px solid var(--bg);background:linear-gradient(135deg,#6d4fea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-left:-6px;flex-shrink:0}
.linked-ideas-bar{padding:8px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:rgba(6,6,15,0.5);overflow-x:auto;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:12px}
.chat-footer{padding:14px 22px;border-top:1px solid var(--border);background:rgba(6,6,15,0.82);backdrop-filter:blur(20px);flex-shrink:0}
.chat-input-row{display:flex;align-items:flex-end;gap:10px}

.msg-time{font-size:10px;color:var(--text3);margin-top:3px;text-align:right}

.admin-table{width:100%;border-collapse:collapse}

// ─── LOGIN ──────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div class="login-wrap">
    <div class="login-box fade-up">
      <div class="login-logo">
        <div class="login-logo-icon">${I.bolt}</div>
        <h1 class="gradient-text font-display">IdeaVault</h1>
        <p>Private Innovation Platform</p>
        <div class="login-status"><span class="pulse-dot"></span> Invite-only access</div>
      </div>
      <div class="tabs">
        <button class="tab ${S.loginTab==='signin'?'active':''}" onclick="switchTab('signin')">🔑 Sign In</button>
        <button class="tab ${S.loginTab==='collab'?'active':''}" onclick="switchTab('collab')">🤝 Collaborate</button>
      </div>
      ${S.loginTab==='signin'?renderSignIn():renderCollab()}
    </div>

}

function renderSignIn(){return `

    <div style="margin-bottom:20px"><p style="font-family:var(--font-display);font-size:18px;font-weight:700">Welcome back</p><p style="font-size:12px;color:var(--text3);margin-top:3px">Enter your credentials to access the vault</p></div>
    <div id="login-error" class="error-box"></div>
    <div class="form-group"><label class="label">Email Address</label><input id="login-email" type="email" placeholder="you@example.com" class="input" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="form-group"><label class="label">Invite Code</label><input id="login-code" type="text" placeholder="VAULT-XXXX-XXXX" class="input" style="font-family:monospace;text-transform:uppercase;letter-spacing:0.05em" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button onclick="doLogin()" class="btn btn-primary" style="width:100%;padding:13px;font-size:14px;border-radius:12px;margin-top:4px">Enter IdeaVault →</button>
    <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:14px">No invite code? <span style="color:var(--accent2);cursor:pointer" onclick="switchTab('collab')">Use the Collaborate tab →</span></p>
  </div>`;}

  <div class="glass" style="border-radius:18px;padding:26px">

      <div class="form-group"><label class="label">Your Name</label><input id="guest-name" placeholder="e.g. Alex" class="input" onkeydown="if(event.key==='Enter')guestCreate()"/></div>

      <div class="form-group"><label class="label">Group Join Code</label><input id="join-code" placeholder="GRP-XXXXXX" class="input" style="font-family:monospace;text-transform:uppercase;letter-spacing:0.05em" onkeydown="if(event.key==='Enter')guestJoin()"/></div>
      <button onclick="guestJoin()" class="btn btn-primary" style="width:100%;padding:13px;border-radius:12px">🔗 Join Group Session</button>
    </div>
  </div>`;}

function switchTab(t){S.loginTab=t;S.collabMode=null;render();}
function setCollabMode(m){
  S.collabMode=m;
  ['collab-create','collab-join'].forEach(id=>{const el=document.getElementById(id);if(el)el.className=(id==='collab-create'&&m==='create')||(id==='collab-join'&&m==='join')?'':'hidden';});
  document.getElementById('opt-create')?.classList.toggle('selected',m==='create');
  document.getElementById('opt-join')?.classList.toggle('selected',m==='join');
}

function doLogin(){
  const email=(document.getElementById('login-email')?.value||'').trim().toLowerCase();
  const code=(document.getElementById('login-code')?.value||'').trim().toUpperCase();
  const codes=DB.get('codes',[]);
  const match=codes.find(c=>c.code===code&&c.email.toLowerCase()===email);
  if(!match){showErr('login-error','Invalid email or invite code. Please check and try again.');return;}
  const name=email.split('@')[0];
  const user={email,role:match.role,name:name.charAt(0).toUpperCase()+name.slice(1),isGuest:false};
  DB.set('user',user);S.user=user;S.view='dashboard';render();
}

function guestCreate(){
  const name=(document.getElementById('guest-name')?.value||'').trim();
  const grpName=(document.getElementById('guest-grp-name')?.value||'').trim();
  const grpDesc=(document.getElementById('guest-grp-desc')?.value||'').trim();
  if(!name||!grpName){showErr('collab-error','Please enter your name and a group name.');return;}
  const guestEmail='guest_'+Date.now()+'@collab.local';
  const user={email:guestEmail,role:'guest',name,isGuest:true};
  DB.set('user',user);S.user=user;
  const joinCode='GRP-'+Math.random().toString(36).substr(2,6).toUpperCase();
  const groups=DB.get('groups',[]);
  const g={id:'grp_'+Date.now(),name:grpName,description:grpDesc||'Private collaboration session',members:[guestEmail],memberNames:{[guestEmail]:name},ideas:[],joinCode,
    messages:[{id:'m0',author:'system',name:'IdeaVault',text:`Welcome to "${grpName}"! 🎉 Share code 🔑 ${joinCode} so others can join via the Collaborate tab.`,time:fmtTime(),date:'Today'}]};
  groups.push(g);DB.set('groups',groups);
  S.view='group';S.activeGroup=g.id;render();
}

function guestJoin(){
  const name=(document.getElementById('join-name')?.value||'').trim();
  const code=(document.getElementById('join-code')?.value||'').trim().toUpperCase();
  if(!name||!code){showErr('collab-error','Please enter your name and a group code.');return;}
  const groups=DB.get('groups',[]);
  const g=groups.find(g=>g.joinCode===code);
  if(!g){showErr('collab-error','Group code not found. Please check and try again.');return;}
  const guestEmail='guest_'+Date.now()+'@collab.local';
  const user={email:guestEmail,role:'guest',name,isGuest:true};
  DB.set('user',user);S.user=user;
  g.members.push(guestEmail);g.memberNames=g.memberNames||{};g.memberNames[guestEmail]=name;
  g.messages.push({id:'m'+Date.now(),author:'system',name:'IdeaVault',text:`${name} has joined the group! 👋`,time:fmtTime(),date:'Today'});
  DB.set('groups',groups);S.view='group';S.activeGroup=g.id;render();
}

function showErr(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add('show');}}

// ─── SIDEBAR ─────────────────────────────────────────────────────
function renderSidebar(){

function renderMsg(m){
  if(m.author==='system') return `<div class="msg-system fade-in"><div class="bubble-system">${m.text}</div></div>`;
  const isSelf=m.author===S.user.email;
  if(isSelf) return `<div class="msg-self fade-in"><div class="bubble-self">${m.text}</div><div class="msg-time">${m.time}</div></div>`;
  return `<div class="msg-other fade-in flex gap-2"><div class="msg-avatar">${m.name[0]}</div><div><div class="msg-name">${m.name}</div><div class="bubble-other">${m.text}</div><div class="msg-time msg-time-left">${m.time}</div></div></div>`;
}

function sendMsg(groupId){
  const input=document.getElementById('chat-input');const text=(input?.value||'').trim();
  if(!text)return;
  const groups=DB.get('groups',[]);const g=groups.find(g=>g.id===groupId);
  const msg={id:'m'+Date.now(),author:S.user.email,name:S.user.name,text,time:fmtTime(),date:'Today'};
  g.messages.push(msg);DB.set('groups',groups);
  input.value='';input.style.height='auto';
  const container=document.getElementById('chat-messages');
  if(container){const div=document.createElement('div');div.innerHTML=renderMsg(msg);container.appendChild(div.firstElementChild);scrollChat();}
}

function copyCode(code){
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.getElementById('copy-code-btn');
    if(btn){const o=btn.innerHTML;btn.innerHTML='✅ Copied!';setTimeout(()=>{btn.innerHTML=o;},2000);}
  }).catch(()=>alert('Code: '+code));
}

function scrollChat(){setTimeout(()=>{const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},60);}

function generateCode(){
  const email=prompt('Enter email address for this invite code:');
  if(!email||!email.includes('@'))return;
  const adj=['ALPHA','BETA','GAMMA','DELTA','SIGMA','THETA','OMEGA','PRIME'];
  const code='VAULT-'+Math.floor(1000+Math.random()*9000)+'-'+adj[Math.floor(Math.random()*adj.length)];
  const codes=DB.get('codes',[]);
  codes.push({code,email:email.toLowerCase(),used:false,role:'user'});
  DB.set('codes',codes);render();
}

function shareCode(email,code){S.modal={type:'share',email,code};render();}
function revokeCode(code){
  if(!confirm('Revoke code '+code+'? This user will lose access.'))return;
  DB.set('codes',DB.get('codes',[]).filter(c=>c.code!==code));render();
}

function showModal(){

function submitModalHTML(){return `

function submitIdea(){
  const title=(document.getElementById('idea-title')?.value||'').trim();
  const desc=(document.getElementById('idea-desc')?.value||'').trim();
  if(!title||!desc){showErr('submit-error','Please fill in both the title and description.');return;}
  document.getElementById('submit-form').style.display='none';
  document.getElementById('analyze-state').style.display='block';
  const steps=['Checking existing solutions...','Searching research databases...','Scanning Google Scholar...','Analyzing novelty...','Generating insights...'];
  let step=0;const iv=setInterval(()=>{step++;const el=document.getElementById('analyze-status');if(el&&steps[step])el.textContent=steps[step];},640);
  setTimeout(()=>{
    clearInterval(iv);
    const ideas=DB.get('ideas',[]);const isNew=ideas.length%2===0;
    const idea={id:'idea_'+Date.now(),title,description:desc,author:S.user.email,authorName:S.user.name,date:new Date().toISOString().split('T')[0],status:'analyzed',isNew,
      analysis:isNew?{verdict:'new',summary:'No significant overlap with known existing solutions. This appears to be a genuinely novel concept worth exploring further.',
        howItWorks:['Define the core problem space and target users clearly','Build a proof-of-concept prototype around the unique value proposition','Validate with potential users through interviews and surveys','Integrate relevant technologies identified in the research papers','Iterate based on feedback and scale progressively'],
        papers:[{title:'Innovation in '+title.split(' ').slice(0,3).join(' ')+': A Survey',authors:'Research Collective',year:2024,url:'https://scholar.google.com/scholar?q='+encodeURIComponent(title),source:'Google Scholar'},{title:'Emerging Technology Trends and Applications',authors:'Chen & Williams',year:2024,url:'https://scholar.google.com/scholar?q='+encodeURIComponent(title)+'+novel',source:'arXiv'},{title:'Design Thinking for Breakthrough Innovation',authors:'IDEO Research Lab',year:2023,url:'https://scholar.google.com/scholar?q=design+thinking+innovation',source:'Stanford'}]}
      :{verdict:'exists',summary:'Similar concepts have been explored in existing products and research. Consider differentiating through a unique angle, niche focus, or superior execution.',
        existingLinks:[{title:title+' — Overview',url:'https://en.wikipedia.org/wiki/Special:Search/'+encodeURIComponent(title),desc:'General overview and history'},{title:'Related Open Source Projects',url:'https://github.com/search?q='+encodeURIComponent(title.split(' ')[0]),desc:'Browse existing implementations on GitHub'},{title:'Product Hunt Alternatives',url:'https://www.producthunt.com/search?q='+encodeURIComponent(title),desc:'Discover related products'}],
        papers:[{title:'The State of '+title.split(' ').slice(0,2).join(' ')+': Literature Review',authors:'Academic Consortium',year:2024,url:'https://scholar.google.com/scholar?q='+encodeURIComponent(title),source:'Google Scholar'},{title:'Comparative Analysis of Similar Systems',authors:'Patel & Rodriguez',year:2023,url:'https://scholar.google.com/scholar?q='+encodeURIComponent(title)+'+comparison',source:'IEEE'}]}};
    ideas.push(idea);DB.set('ideas',ideas);
    S.modal=null;S.activeIdea=idea.id;S.view='idea';render();
  },3300);
}

function groupModalHTML(ideaId){
  const ideas=DB.get('ideas',[]);const linked=ideas.find(i=>i.id===ideaId);
  return `<div class="modal scale-in">
    <div class="modal-title">Create Collaboration Group</div>
    <div class="modal-sub">A join code is auto-generated so anyone can join via the Collaborate tab</div>
    <div class="form-group"><label class="label">Group Name</label><input id="grp-name" placeholder="e.g. 🚀 Future Tech Lab" class="input"/></div>
    <div class="form-group"><label class="label">Description</label><input id="grp-desc" placeholder="What will this group focus on?" class="input"/></div>
    ${linked?`<div style="background:rgba(124,92,252,0.08);border:1px solid rgba(124,92,252,0.2);border-radius:var(--radius-sm);padding:12px 14px;font-size:12px;color:var(--text2);margin-bottom:4px">💡 Linked idea: <strong style="color:var(--accent2)">${linked.title}</strong></div>`:''}
    <div class="modal-footer"><button class="btn btn-ghost" onclick="S.modal=null;render()">Cancel</button><button class="btn btn-primary" onclick="createGroup('${ideaId||''}')">Create Group</button></div>
  </div>`;}

function createGroup(ideaId){
  const name=(document.getElementById('grp-name')?.value||'').trim();
  const desc=(document.getElementById('grp-desc')?.value||'').trim();
  if(!name)return;
  const joinCode='GRP-'+Math.random().toString(36).substr(2,6).toUpperCase();
  const groups=DB.get('groups',[]);
  const g={id:'grp_'+Date.now(),name,description:desc||'No description',members:[S.user.email],memberNames:{[S.user.email]:S.user.name},ideas:ideaId?[ideaId]:[],joinCode,
    messages:[{id:'m0',author:'system',name:'IdeaVault',text:`Welcome to "${name}"! 🎉 Share code 🔑 ${joinCode} so others can join via the Collaborate tab.`,time:fmtTime(),date:'Today'}]};
  groups.push(g);DB.set('groups',groups);S.modal=null;viewGroup(g.id);
}

function addMemberModalHTML(groupId){
  const g=DB.get('groups',[]).find(g=>g.id===groupId);
  return `<div class="modal scale-in">
    <div class="modal-title">Add Member</div>
    <div class="modal-sub">Share the join code or add by email directly</div>
    ${g?.joinCode?`<div class="code-display"><span class="code-text">${g.joinCode}</span><button onclick="navigator.clipboard.writeText('${g.joinCode}').then(()=>{this.textContent='✅';setTimeout(()=>this.textContent='${I.copy} Copy',1800)})" class="btn btn-ghost btn-sm">${I.copy} Copy</button></div><p style="font-size:11px;color:var(--text3);margin-bottom:14px">Others can use this code via <strong style="color:var(--accent2)">Collaborate → Join Group</strong></p>`:''}
    <div class="form-group"><label class="label">Or add by email</label><input id="member-email" type="email" placeholder="member@example.com" class="input"/></div>
    <div id="member-error" class="error-box"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="S.modal=null;render()">Close</button><button class="btn btn-primary" onclick="addMember('${groupId}')">Add by Email</button></div>
  </div>`;}

function addMember(groupId){
  const email=(document.getElementById('member-email')?.value||'').trim().toLowerCase();
  const codes=DB.get('codes',[]);
  if(!codes.find(c=>c.email.toLowerCase()===email)){showErr('member-error','This email is not registered on IdeaVault.');return;}
  const groups=DB.get('groups',[]);const g=groups.find(g=>g.id===groupId);
  if(!g.members.includes(email)){
    g.members.push(email);
    g.messages.push({id:'m'+Date.now(),author:'system',name:'IdeaVault',text:email+' has joined the group!',time:fmtTime(),date:'Today'});
    DB.set('groups',groups);
  }
  S.modal=null;viewGroup(groupId);
}

function shareModalHTML(email,code){return `
  <div class="modal scale-in" style="text-align:center">
    <div style="font-size:48px;margin-bottom:12px">🔑</div>
    <div class="modal-title">Share Invite Code</div>
    <div class="modal-sub" style="margin-bottom:20px">For ${email}</div>
    <div class="glass" style="border-radius:var(--radius-sm);padding:16px;margin-bottom:18px;text-align:left">
      <div class="flex justify-between items-center mb-2"><span style="font-size:11px;color:var(--text3)">Email</span><span style="font-size:13px;font-weight:500">${email}</span></div>
      <div class="flex justify-between items-center"><span style="font-size:11px;color:var(--text3)">Code</span><span style="font-family:monospace;font-weight:700;color:var(--accent2);letter-spacing:0.05em">${code}</span></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="navigator.clipboard.writeText('IdeaVault\\nEmail: ${email}\\nCode: ${code}').then(()=>{this.textContent='✅ Copied!';setTimeout(()=>this.textContent='📋 Copy Details',2000)})">${I.copy} Copy Details</button>
      <button class="btn btn-primary" onclick="S.modal=null;render()">Done</button>
    </div>
  </div>`;}

// ─── UTILS ────────────────────────────────────────────────────────
function fmtTime(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}

// ─── INIT ─────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
