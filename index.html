<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IdeaVault — Private Innovation Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;--bg2:#0d0d1f;--bg3:#12122a;
  --surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --accent:#7c5cfc;--accent2:#a78bfa;--accent3:#c084fc;
  --emerald:#10b981;--amber:#f59e0b;--red:#ef4444;
  --text:#e8e8f0;--text2:#9898b0;--text3:#5a5a78;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --sidebar:260px;--shadow:0 8px 32px rgba(0,0,0,0.4);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(124,92,252,0.4);border-radius:99px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:0.025;pointer-events:none;z-index:9999}
.bg-blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(120px);animation:float 20s ease-in-out infinite}
.blob1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,92,252,0.12),transparent 70%);top:-200px;left:-200px}
.blob2{width:500px;height:500px;background:radial-gradient(circle,rgba(192,132,252,0.08),transparent 70%);bottom:-150px;right:-100px;animation-delay:-7s}
.blob3{width:400px;height:400px;background:radial-gradient(circle,rgba(16,185,129,0.06),transparent 70%);top:40%;left:40%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}
#app{position:relative;z-index:1;min-height:100vh}
.glass{background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border)}
.gradient-text{background:linear-gradient(135deg,#a78bfa,#c084fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-body);font-weight:500;cursor:pointer;transition:all 0.2s;border:none;outline:none;white-space:nowrap;font-size:13px}
.btn-primary{background:linear-gradient(135deg,#6d4fea,#8b5cf6,#a855f7);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);box-shadow:0 4px 20px rgba(124,92,252,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,92,252,0.5)}
.btn-ghost{background:var(--surface2);color:var(--text2);padding:9px 18px;border-radius:var(--radius-sm);border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.btn-danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);padding:6px 12px;border-radius:var(--radius-xs)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--radius-xs)}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:5px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px}
.input{width:100%;background:rgba(6,6,15,0.6);border:1px solid var(--border2);color:var(--text);padding:12px 16px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;outline:none;transition:all 0.2s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.15)}
.input::placeholder{color:var(--text3)}
textarea.input{resize:none}
.label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap}
.tag-novel{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25)}
.tag-exists{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.25)}
.tag-admin{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.tag-demo{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);color:#fbbf24;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.tag-guest{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);font-size:10px;padding:2px 7px;border-radius:4px}
.tag-default{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}
@keyframes progress{from{width:0}to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp 0.4s ease forwards}
.scale-in{animation:scaleIn 0.25s ease forwards}
.pulse-dot{width:7px;height:7px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite;display:inline-block;flex-shrink:0}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);border-radius:22px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(124,92,252,0.4)}
.login-status{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;font-size:11px;font-weight:500;padding:4px 12px;border-radius:99px;margin-top:10px}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.2s;text-align:center;border:none;background:transparent;font-family:var(--font-body)}
.tab.active{background:linear-gradient(135deg,#6d4fea,#8b5cf6);color:#fff;box-shadow:0 3px 12px rgba(124,92,252,0.35)}
.form-group{margin-bottom:16px}
.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:16px;display:none}
.error-box.show{display:block}
.option-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.option-card{background:rgba(6,6,15,0.6);border:1px solid var(--border2);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all 0.22s;text-align:center}
.option-card:hover{border-color:rgba(124,92,252,0.4);background:rgba(124,92,252,0.06);transform:translateY(-2px)}
.option-card.selected{border-color:var(--accent);background:rgba(124,92,252,0.12)}
/* LAYOUT */
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:rgba(6,6,15,0.8);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo-text{font-family:var(--font-display);font-weight:700;font-size:15px}
.sidebar-logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sidebar-user{margin:12px;padding:12px;background:rgba(124,92,252,0.08);border:1px solid rgba(124,92,252,0.18);border-radius:12px;display:flex;align-items:center;gap:10px}
.sidebar-user-avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.sidebar-user-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-email{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.demo-banner{margin:0 12px 8px;padding:12px 14px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);border-radius:12px;font-size:11px;color:#fbbf24;line-height:1.5}
.sidebar-nav{padding:8px 10px;flex:1}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:13px;font-weight:500;border:1px solid transparent;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:rgba(124,92,252,0.14);border-color:rgba(124,92,252,0.25);color:#c4b5fd}
.nav-item svg{opacity:0.65;flex-shrink:0;width:15px;height:15px}
.nav-item.admin-nav{color:#fbbf24}
.nav-item.admin-nav.active{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border-radius:10px;background:none;border:none;color:var(--text3);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all 0.15s}
.logout-btn:hover{background:rgba(239,68,68,0.08);color:#f87171}
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;background:rgba(6,6,15,0.82);backdrop-filter:blur(20px)}
.topbar-title{font-family:var(--font-display);font-size:16px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.content{padding:28px;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-icon{font-size:22px;margin-bottom:10px}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--text);line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-display);font-size:15px;font-weight:700}
.tab-pills{display:flex;gap:6px}
.pill{padding:5px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;font-family:var(--font-body)}
.pill.active{background:linear-gradient(135deg,#6d4fea,#8b5cf6);color:#fff}
.pill:not(.active){background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.idea-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s}
.idea-card:hover{border-color:rgba(124,92,252,0.4);background:rgba(124,92,252,0.04);transform:translateY(-2px)}
.idea-card-title{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.idea-card-meta{font-size:11px;color:var(--text3);margin-bottom:10px}
.idea-card-desc{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.add-idea-card{border:1px dashed rgba(124,92,252,0.25);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;color:var(--text3)}
.add-idea-card:hover{border-color:rgba(124,92,252,0.5);background:rgba(124,92,252,0.04);color:var(--text2)}
.add-idea-icon{width:36px;height:36px;border-radius:10px;background:rgba(124,92,252,0.12);display:flex;align-items:center;justify-content:center}
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s}
.group-card:hover{border-color:rgba(124,92,252,0.4);transform:translateY(-2px)}
.group-card-name{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:4px}
.group-card-desc{font-size:12px;color:var(--text2);margin-bottom:12px}
.join-code-badge{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;font-family:monospace}
/* IDEA DETAIL */
.idea-desc-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px}
.analysis-box{background:var(--surface);border:1px solid rgba(124,92,252,0.2);border-radius:var(--radius);padding:22px;margin-bottom:18px}
.analysis-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.analysis-icon{width:36px;height:36px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.verdict-box{padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:16px}
.verdict-novel{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2)}
.verdict-exists{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2)}
.step-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.step-num{width:24px;height:24px;border-radius:99px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.paper-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:rgba(6,6,15,0.5);border:1px solid var(--border);transition:all 0.2s;text-decoration:none;margin-bottom:8px}
.paper-card:hover{border-color:rgba(124,92,252,0.35);background:rgba(124,92,252,0.05)}
.paper-icon{width:36px;height:36px;border-radius:9px;background:rgba(168,85,247,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.paper-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.paper-card:hover .paper-title{color:var(--accent2)}
.paper-meta{font-size:11px;color:var(--text3)}
.link-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:rgba(6,6,15,0.5);border:1px solid var(--border);transition:all 0.2s;text-decoration:none;margin-bottom:8px}
.link-card:hover{border-color:rgba(124,92,252,0.35);background:rgba(124,92,252,0.05)}
.link-icon{width:36px;height:36px;border-radius:9px;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.deep-dive-box{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.deep-dive-text{font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap}
/* CHAT */
.chat-layout{display:flex;flex-direction:column;height:100vh;max-height:100vh}
.chat-topbar{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(6,6,15,0.82);backdrop-filter:blur(20px);flex-shrink:0}
.chat-title{font-family:var(--font-display);font-size:15px;font-weight:700}
.member-avatars{display:flex;margin-left:auto}
.member-avatar{width:28px;height:28px;border-radius:99px;border:2px solid var(--bg);background:linear-gradient(135deg,#6d4fea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-left:-6px;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:12px}
.chat-footer{padding:14px 22px;border-top:1px solid var(--border);background:rgba(6,6,15,0.82);backdrop-filter:blur(20px);flex-shrink:0}
.chat-input-row{display:flex;align-items:flex-end;gap:10px}
.chat-input{flex:1;background:rgba(6,6,15,0.6);border:1px solid var(--border2);color:var(--text);padding:11px 16px;border-radius:12px;font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 0.2s;resize:none;max-height:120px}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--text3)}
.send-btn{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.send-btn:hover{transform:scale(1.05)}
.msg-self{align-self:flex-end;max-width:70%}
.msg-other{align-self:flex-start;max-width:70%}
.msg-system{align-self:center;max-width:90%}
.bubble-self{background:linear-gradient(135deg,#6d4fea,#8b5cf6);padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:13px;color:#fff;line-height:1.5}
.bubble-other{background:var(--bg3);border:1px solid var(--border);padding:10px 14px;border-radius:16px 16px 16px 4px;font-size:13px;color:var(--text);line-height:1.5}
.bubble-system{background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:7px 14px;border-radius:99px;font-size:11px;color:var(--text3);text-align:center}
.msg-avatar{width:28px;height:28px;border-radius:99px;background:linear-gradient(135deg,#6d4fea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-end}
.msg-name{font-size:10px;color:var(--text3);margin-bottom:3px}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px;text-align:right}
/* ADMIN */
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border)}
.admin-table td{padding:12px 16px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(255,255,255,0.015)}
.code-cell{font-family:monospace;color:var(--accent2);font-size:11px}
.admin-tabs{display:flex;gap:6px;margin-bottom:22px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:22px;padding:28px;width:100%;max-width:500px;animation:scaleIn 0.22s ease;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:22px}

  document.getElementById('collab-join')?.classList.toggle('hidden',m!=='join');
  document.getElementById('opt-create')?.classList.toggle('selected',m==='create');

  const u={email:'demo@ideavault.app',role:'demo',name:'Demo User',isGuest:false,isDemo:true};
  DB.set('user',u);S.user=u;S.view='dashboard';render();

function doLogin(){
  const email=(document.getElementById('login-email')?.value||'').trim().toLowerCase();
  const code=(document.getElementById('login-code')?.value||'').trim().toUpperCase();
  const codes=DB.get('codes',[]);
  const match=codes.find(c=>c.code===code&&c.email.toLowerCase()===email);
  if(!match){showErr('login-error','Invalid email or invite code. Please check and try again.');return;}
  const n=email.split('@')[0];
  const u={email,role:match.role,name:match.role==='demo'?'Demo User':n.charAt(0).toUpperCase()+n.slice(1),isGuest:false,isDemo:match.role==='demo'};
  DB.set('user',u);S.user=u;S.view='dashboard';render();
}
function guestCreate(){
  const name=(document.getElementById('guest-name')?.value||'').trim();
  const grpName=(document.getElementById('guest-grp-name')?.value||'').trim();
  const grpDesc=(document.getElementById('guest-grp-desc')?.value||'').trim();
  if(!name||!grpName){showErr('collab-error','Please enter your name and a group name.');return;}
  const ge='guest_'+Date.now()+'@collab.local';
  const u={email:ge,role:'guest',name,isGuest:true,isDemo:false};
  DB.set('user',u);S.user=u;
  const jc='GRP-'+Math.random().toString(36).substr(2,6).toUpperCase();
  const groups=DB.get('groups',[]);
  const g={id:'grp_'+Date.now(),name:grpName,description:grpDesc||'Private session',members:[ge],memberNames:{[ge]:name},ideas:[],joinCode:jc,
    messages:[{id:'m0',author:'system',name:'IdeaVault',text:`Welcome to "${grpName}"! 🎉 Share code 🔑 ${jc} so others can join.`,time:fmtTime(),date:'Today'}]};
  groups.push(g);DB.set('groups',groups);S.view='group';S.activeGroup=g.id;render();
}

function msgHTML(m){
  if(m.author==='system')return `<div class="msg-system"><div class="bubble-system">${m.text}</div></div>`;
  const self=m.author===S.user.email;
  if(self)return `<div class="msg-self"><div class="bubble-self">${m.text}</div><div class="msg-time">${m.time}</div></div>`;
  return `<div class="msg-other flex gap-2"><div class="msg-avatar">${m.name[0]}</div><div><div class="msg-name">${m.name}</div><div class="bubble-other">${m.text}</div><div class="msg-time" style="text-align:left">${m.time}</div></div></div>`;
}
function sendMsg(groupId){
  if(isDemo())return;
  const input=document.getElementById('chat-input');const text=(input?.value||'').trim();
  if(!text)return;
  const groups=DB.get('groups',[]);const g=groups.find(g=>g.id===groupId);
  const msg={id:'m'+Date.now(),author:S.user.email,name:S.user.name,text,time:fmtTime(),date:'Today'};
  g.messages.push(msg);DB.set('groups',groups);
  input.value='';input.style.height='auto';
  const c=document.getElementById('chat-messages');
  if(c){const d=document.createElement('div');d.innerHTML=msgHTML(msg);c.appendChild(d.firstElementChild);scrollChat();}
}
function copyCode(code){navigator.clipboard.writeText(code).then(()=>{const b=document.getElementById('copy-code-btn');if(b){const o=b.innerHTML;b.innerHTML='✅ Copied!';setTimeout(()=>{b.innerHTML=o;},2000);}});}
function scrollChat(){setTimeout(()=>{const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},60);}

function generateCode(){
  const email=prompt('Enter email address for this invite code:');
  if(!email||!email.includes('@'))return;
  const adj=['ALPHA','BETA','GAMMA','DELTA','SIGMA','THETA','OMEGA','PRIME'];
  const code='VAULT-'+Math.floor(1000+Math.random()*9000)+'-'+adj[Math.floor(Math.random()*adj.length)];
  const codes=DB.get('codes',[]);
  codes.push({code,email:email.toLowerCase(),used:false,role:'user'});
  DB.set('codes',codes);render();
}

function addMemberAdmin(){
  var name=(document.getElementById('am-name')?.value||'').trim();
  var email=(document.getElementById('am-email')?.value||'').trim().toLowerCase();
  var role=document.getElementById('am-role')?.value||'user';
  if(!name||!email||!email.includes('@')){showErr('am-error','Please fill in all fields with a valid email.');return;}
  var codes=DB.get('codes',[]);
  if(codes.find(c=>c.email===email)){showErr('am-error','This email already has an invite code.');return;}
  var adj=['ALPHA','BETA','GAMMA','DELTA','SIGMA','THETA','OMEGA','PRIME'];
  var code='VAULT-'+Math.floor(1000+Math.random()*9000)+'-'+adj[Math.floor(Math.random()*adj.length)];
  codes.push({code,email,name,used:false,role});
  DB.set('codes',codes);
  S.modal={type:'addmember_admin_done',name,email,code,role};render();
}

    +'<div class="flex justify-between items-center" style="margin-bottom:14px"><span style="font-size:11px;color:var(--text3)">Role</span><span style="font-size:12px;font-weight:700;color:'+roleColor+'">'+roleBadge+'</span></div>'
    +'<div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between">'

}
function shareCode(email,code){S.modal={type:'share',email,code};render();}
function revokeCode(code){
  if(!confirm('Revoke code '+code+'? This user will lose access.'))return;

function doLogout(){DB.del('user');S.user=null;S.view='login';S.loginTab='signin';S.collabMode=null;render();}

// ─── MODALS ───────────────────────────────────────────────────────
function openSubmitModal(){if(!canSubmitIdea()){alert('Only admin can submit ideas.');return;}S.modal='submit';render();}
function openGroupModal(ideaId=null){if(!canCreateGroup()){alert('Demo users cannot create groups.');return;}S.modal={type:'group',ideaId};render();}
function openAddMemberModal(groupId){if(!canAddMember()){alert('Only admin can add members.');return;}S.modal={type:'addmember',groupId};render();}

function showModal(){
  const m=S.modal;if(!m)return;
  let html='';
  if(m==='submit')html=submitModalHTML();
  else if(m?.type==='addmember_admin')html=addMemberAdminModalHTML();
  else if(m?.type==='addmember_admin_done')html=addMemberAdminDoneHTML(m.name,m.email,m.code,m.role);
  else if(m?.type==='group')html=groupModalHTML(m.ideaId);
  else if(m?.type==='addmember')html=addMemberModalHTML(m.groupId);
  else if(m?.type==='share')html=shareModalHTML(m.email,m.code);
  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.innerHTML=html;
  ov.addEventListener('click',e=>{if(e.target===ov){S.modal=null;render();}});
  document.getElementById('app').appendChild(ov);
}

function submitModalHTML(){return `
  <div class="modal scale-in">
    <div class="modal-title">Submit New Idea</div>
    <div class="modal-sub">Claude AI will analyze novelty, competition, research papers, and give a full expert breakdown</div>
    <div id="submit-form">
      <div class="form-group"><label class="label">Idea Title</label><input id="idea-title" placeholder="Give your idea a clear title" class="input"/></div>
      <div class="form-group"><label class="label">Description</label><textarea id="idea-desc" placeholder="Describe your idea in detail — what problem does it solve? Who is it for? How would it work?" rows="5" class="input"></textarea></div>
      <div id="submit-error" class="error-box"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="S.modal=null;render()">Cancel</button>
        <button class="btn btn-primary" onclick="submitIdea()">🧠 Analyze with Claude AI</button>
      </div>
    </div>
    <div id="analyze-state" class="analyze-state" style="display:none">
      <div class="analyze-spinner"><svg width="24" height="24" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></div>
      <div style="font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:6px">Claude is analyzing your idea</div>
      <div id="analyze-status" style="font-size:12px;color:var(--text3)">Connecting to Claude AI...</div>

// ─── CLAUDE AI ANALYSIS ───────────────────────────────────────────
async function submitIdea(){
  if(!canSubmitIdea())return;
  const title=(document.getElementById('idea-title')?.value||'').trim();
  const desc=(document.getElementById('idea-desc')?.value||'').trim();
  if(!title||!desc){showErr('submit-error','Please fill in both fields.');return;}
  document.getElementById('submit-form').style.display='none';
  document.getElementById('analyze-state').style.display='block';
  const statusEl=document.getElementById('analyze-status');
  const steps=['Connecting to Claude AI...','Reading your idea carefully...','Checking novelty against known solutions...','Researching the competitive landscape...','Generating implementation roadmap...','Writing expert deep-dive insights...'];
  let step=0;
  const iv=setInterval(()=>{step=Math.min(step+1,steps.length-1);if(statusEl)statusEl.textContent=steps[step];},1100);
  try{
    const prompt=`You are a world-class innovation analyst and startup advisor. Analyze the following idea and respond ONLY with a valid JSON object — no markdown, no backticks, no explanation, just raw JSON.

Idea Title: "${title}"
Description: "${desc}"

Return exactly this structure:
{
  "verdict": "new" or "exists",
  "isNew": true or false,
  "summary": "2-3 precise sentences on whether this is novel or already solved",
  "howItWorks": ["step 1", "step 2", "step 3", "step 4", "step 5"],
  "existingLinks": [{"title": "Product Name", "url": "https://real-url.com", "desc": "What it does"}],
  "papers": [
    {"title": "Paper Title", "authors": "Author Names", "year": 2024, "url": "https://scholar.google.com/scholar?q=relevant+query", "source": "Google Scholar"},
    {"title": "Paper Title 2", "authors": "Author Names", "year": 2023, "url": "https://scholar.google.com/scholar?q=relevant+query+2", "source": "arXiv"},
    {"title": "Paper Title 3", "authors": "Author Names", "year": 2024, "url": "https://scholar.google.com/scholar?q=relevant+query+3", "source": "IEEE"}
  ],
  "deepDive": "5-7 sentences of sharp expert analysis: the core innovation or gap, realistic market opportunity, the single biggest technical challenge, the primary competitive threat, the ideal go-to-market wedge, and what the founder must absolutely get right to succeed. Be specific, insightful, and direct — not generic."
}

Rules:
- howItWorks: only include if verdict is "new" (5 concrete implementation steps)
- existingLinks: only include if verdict is "exists" (3 real competing products with real URLs)
- Always include 3 papers regardless of verdict
- deepDive: always include, always 5-7 sentences, always sharp and specific`;

    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    clearInterval(iv);
    if(statusEl)statusEl.textContent='Processing Claude\'s response...';
    const data=await response.json();
    const raw=data.content?.map(b=>b.text||'').join('').trim();
    const clean=raw.replace(/```json|```/g,'').trim();
    const result=JSON.parse(clean);
    saveIdea(title,desc,result);
  }catch(err){
    clearInterval(iv);
    console.error('Claude API error:',err);
    if(statusEl)statusEl.textContent='Using offline analysis...';
    setTimeout(()=>{
      const isNew=DB.get('ideas',[]).length%2===0;
      const fallback={
        verdict:isNew?'new':'exists',isNew,
        summary:isNew?'This appears to be a genuinely novel concept with limited direct competition in the identified niche.':'Similar concepts already exist in the market and are well-developed. Differentiation is key.',
        howItWorks:isNew?['Define the core problem and identify your primary target user segment','Build a focused prototype around the single strongest part of your idea','Run 20+ user interviews to validate the pain point and your proposed solution','Identify and integrate the key enabling technologies from the research below','Launch a closed beta, measure obsessively, and iterate before scaling']:undefined,
        existingLinks:!isNew?[{title:title+' — Overview',url:'https://en.wikipedia.org/wiki/Special:Search/'+encodeURIComponent(title),desc:'Background and history'},{title:'GitHub: Related Open Source',url:'https://github.com/search?q='+encodeURIComponent(title.split(' ')[0]),desc:'Existing implementations'},{title:'Product Hunt Alternatives',url:'https://www.producthunt.com/search?q='+encodeURIComponent(title),desc:'Competing products'}]:undefined,
        papers:[{title:'Innovation Frameworks for Emerging Tech',authors:'Research Collective',year:2024,url:'https://scholar.google.com/scholar?q='+encodeURIComponent(title),source:'Google Scholar'},{title:'Market Validation in Early-Stage Startups',authors:'Chen & Williams',year:2024,url:'https://scholar.google.com/scholar?q='+encodeURIComponent(title)+'+startup',source:'arXiv'},{title:'Competitive Strategy in Technology Markets',authors:'Porter & Kim',year:2023,url:'https://scholar.google.com/scholar?q=competitive+strategy+technology',source:'HBR'}],
        deepDive:'This idea addresses a real problem space worth exploring. The key to success will be extreme focus on one specific user segment rather than trying to be everything to everyone. Speed of iteration and direct customer feedback will be your most important early competitive advantages. Avoid premature scaling before achieving genuine product-market fit in a narrow niche.'
      };
      saveIdea(title,desc,fallback);
    },1000);
  }
}

function saveIdea(title,desc,result){
  const ideas=DB.get('ideas',[]);
  const idea={
    id:'idea_'+Date.now(),title,description:desc,
    author:S.user.email,authorName:S.user.name,
    date:new Date().toISOString().split('T')[0],status:'analyzed',
    isNew:result.isNew??result.verdict==='new',
    analysis:{verdict:result.verdict,summary:result.summary,howItWorks:result.howItWorks||[],existingLinks:result.existingLinks||[],papers:result.papers||[],deepDive:result.deepDive||''}
  };
  ideas.push(idea);DB.set('ideas',ideas);
  S.modal=null;S.activeIdea=idea.id;S.view='idea';render();
}

function groupModalHTML(ideaId){
  const linked=DB.get('ideas',[]).find(i=>i.id===ideaId);

    <div class="modal-sub">A join code is auto-generated so anyone can join via the Collaborate tab</div>

function createGroup(ideaId){
  const name=(document.getElementById('grp-name')?.value||'').trim();const desc=(document.getElementById('grp-desc')?.value||'').trim();
  if(!name)return;
  const jc='GRP-'+Math.random().toString(36).substr(2,6).toUpperCase();
  const groups=DB.get('groups',[]);
  const g={id:'grp_'+Date.now(),name,description:desc||'No description',members:[S.user.email],memberNames:{[S.user.email]:S.user.name},ideas:ideaId?[ideaId]:[],joinCode:jc,
    messages:[{id:'m0',author:'system',name:'IdeaVault',text:`Welcome to "${name}"! 🎉 Share code 🔑 ${jc} so others can join.`,time:fmtTime(),date:'Today'}]};
  groups.push(g);DB.set('groups',groups);S.modal=null;viewGroup(g.id);
}

function addMemberModalHTML(groupId){
  const g=DB.get('groups',[]).find(g=>g.id===groupId);
  return `<div class="modal scale-in">
    <div class="modal-title">Add Member</div>
    <div class="modal-sub">Share the join code or add a registered user by email</div>
    ${g?.joinCode?`<div class="code-display"><span class="code-text">${g.joinCode}</span><button onclick="navigator.clipboard.writeText('${g.joinCode}').then(()=>{this.textContent='✅ Copied!';setTimeout(()=>{this.textContent='📋 Copy'},1800)})" class="btn btn-ghost btn-sm">${I.copy} Copy</button></div><p style="font-size:11px;color:var(--text3);margin-bottom:16px">Anyone can join via <strong style="color:var(--accent2)">Collaborate → Join Group</strong> on the login page</p>`:''}
    <div class="form-group"><label class="label">Or add by registered email</label><input id="member-email" type="email" placeholder="member@example.com" class="input"/></div>
    <div id="member-error" class="error-box"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="S.modal=null;render()">Close</button><button class="btn btn-primary" onclick="addMember('${groupId}')">Add by Email</button></div>
  </div>`;}

function addMember(groupId){
  const email=(document.getElementById('member-email')?.value||'').trim().toLowerCase();
  if(!DB.get('codes',[]).find(c=>c.email.toLowerCase()===email)){showErr('member-error','This email is not registered on IdeaVault.');return;}
  const groups=DB.get('groups',[]);const g=groups.find(g=>g.id===groupId);
  if(!g.members.includes(email)){
    g.members.push(email);
    g.messages.push({id:'m'+Date.now(),author:'system',name:'IdeaVault',text:email+' has joined the group!',time:fmtTime(),date:'Today'});
    DB.set('groups',groups);
  }
  S.modal=null;viewGroup(groupId);
}
